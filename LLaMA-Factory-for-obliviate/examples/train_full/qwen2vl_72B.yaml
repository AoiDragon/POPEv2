### model
model_name_or_path: __MODEL_NAME_OR_PATH__
image_resolution: 262144
video_resolution: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true  # choices: [true, false]
freeze_multi_modal_projector: true  # choices: [true, false]
train_mm_proj_only: false  # choices: [true, false]
deepspeed: __DEEPSPEED_CONFIG__ # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: ul_2k_8k_qwen
dataset_dir: __DATASET_DIR__
image_dir: __IMAGE_DIR__
template: qwen2_vl
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: __OUTPUT_DIR__
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
# pure_bf16: true
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
save_only_model: True

alpha: 0.01
lm_head_only: true
